name: Value Bet Monitor

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Correr em modo teste'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Correr monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python monitor.py --test
          else
            python monitor.py
          fi

      - name: Guardar cache de alertas
        uses: actions/cache@v4
        with:
          path: sent_alerts.json
          key: alerts-cache-${{ github.run_number }}
          restore-keys: |
            alerts-cache-
