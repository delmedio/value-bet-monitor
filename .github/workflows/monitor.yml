name: Value Bet Monitor

on:
  schedule:
    # De hora a hora
    - cron: '0 * * * *'
    # Report semanal — terças às 08:00 UTC
    - cron: '0 8 * * 2'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - test
          - report

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar cache
        uses: actions/cache@v4
        with:
          path: |
            sent_alerts.json
            picks_log.json
          key: vbm-cache-${{ github.run_number }}
          restore-keys: vbm-cache-

      - name: Correr monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "test" ]; then
            python monitor.py --test
          elif [ "$MODE" = "report" ]; then
            python monitor.py --report
          else
            python monitor.py
          fi

      - name: Guardar cache
        uses: actions/cache@v4
        with:
          path: |
            sent_alerts.json
            picks_log.json
          key: vbm-cache-${{ github.run_number }}
