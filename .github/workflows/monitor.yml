name: Value Bet Monitor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - test
          - report
          - export
          - reset_clv
          - debug_singbet
      debug_league_slug:
        description: 'League slug para debug do bookmaker'
        required: false
        default: ''
        type: string
      debug_event_id:
        description: 'Historical event id para debug direto do bookmaker'
        required: false
        default: ''
        type: string
      debug_bookmaker:
        description: 'Bookmaker exato da API para debug histórico'
        required: false
        default: 'Sbobet'
        type: string
      debug_home_team:
        description: 'Home team para debug do bookmaker'
        required: false
        default: ''
        type: string
      debug_away_team:
        description: 'Away team para debug do bookmaker'
        required: false
        default: ''
        type: string
      debug_from_time:
        description: 'Janela inicial ISO UTC ex: 2026-03-25T00:00:00Z'
        required: false
        default: ''
        type: string
      debug_to_time:
        description: 'Janela final ISO UTC ex: 2026-04-05T23:59:59Z'
        required: false
        default: ''
        type: string

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Correr testes
        run: pytest tests/ -v

      - name: Correr monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode }}"

          if [ "$MODE" = "test" ]; then
            python monitor.py --test
          elif [ "$MODE" = "report" ]; then
            python monitor.py --report
          elif [ "$MODE" = "export" ]; then
            python monitor.py --export
          elif [ "$MODE" = "reset_clv" ]; then
            python reset_clv.py
          elif [ "$MODE" = "debug_singbet" ]; then
            python debug_singbet.py \
              --event-id "${{ github.event.inputs.debug_event_id }}" \
              --bookmaker "${{ github.event.inputs.debug_bookmaker }}" \
              --league-slug "${{ github.event.inputs.debug_league_slug }}" \
              --home "${{ github.event.inputs.debug_home_team }}" \
              --away "${{ github.event.inputs.debug_away_team }}" \
              --from-time "${{ github.event.inputs.debug_from_time }}" \
              --to-time "${{ github.event.inputs.debug_to_time }}"
          else
            python monitor.py
          fi

      - name: Guardar cache no repositório
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -f sent_alerts.json picks_log.json odds_state.json 2>/dev/null || true
          git commit -m "cache: $(date -u '+%Y-%m-%d %H:%M')" || true
          git pull --rebase origin main || true
          git push origin main || true
